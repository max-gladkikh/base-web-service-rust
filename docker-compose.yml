networks:
  bridge_network:
    driver: bridge # по умолчанию драйвер и так bridge, но явное лучше неявного
    name: ${SERVICE_NETWORK_NAME} # без name к названию сети добавляется значение энва COMPOSE_PROJECT_NAME

services:

  nginx_host:
    image: nginx:${DOCKER_NGINX_VERSION}
    ports:
      - "${NGINX_OUTER_PORT_80}:${NGINX_PORT_80}"
      - "${NGINX_OUTER_PORT_443}:${NGINX_PORT_443}"
    tty: true        # docker run -t
    restart: unless-stopped
    volumes:
      - ./static:${NGINX_ROOT_DIR}/static
      - ./nginx/templates/${APP_ENV}:/etc/nginx/templates
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/log/${NGINX_PORT_80}:${NGINX_LOG_DIR}/${NGINX_PORT_80}
      - ./nginx/log/${NGINX_PORT_443}:${NGINX_LOG_DIR}/${NGINX_PORT_443}
      - ./nginx/ssl:${NGINX_SSL_DIR}
    environment:
      - NGINX_PORT_80
      - NGINX_PORT_443
      - NGINX_HOST
      - NGINX_ROOT_DIR
      - NGINX_LOG_DIR
      - RUST_PROJECT_HOST
      - RUST_PORT
      - NGINX_SSL_DIR
    depends_on:
      - ${RUST_PROJECT_HOST}
    networks:
      - bridge_network

  rust_host:
    build:
      context: ./
      dockerfile: rust/Dockerfile/Dockerfile_rust
      args:
        - DOCKER_RUST_VERSION
        - RUST_PORT
#        - PROJECT_USER_EMAIL
#        - PROJECT_USER_NAME
        - NGINX_ROOT_DIR
#        TZ: ${WORKSPACE_TIMEZONE}
    image: ${RUST_PROJECT_IMAGE}:${RUST_PROJECT_VERSION}
    working_dir: ${NGINX_ROOT_DIR}
    tty: true        # docker run -t
    restart: unless-stopped
#    volumes:
##      - ./.ssh:/root/.ssh
##      - ./www/public:${NGINX_ROOT_DIR}/public
##      - .env:${ROOT_DIR}/.env
    environment:
      - APP_ENV
#      - PROJECT_USER_EMAIL
#      - PROJECT_USER_NAME
      - POSTGRES_PROJECT_DB
      - POSTGRES_PROJECT_USER
      - POSTGRES_PASSWORD
      - POSTGRES_PROJECT_HOST
      - POSTGRES_OUTER_PORT
      - POSTGRES_PROJECT_CHARSET
      - POSTGRES_PROJECT_VERSION
      - DATABASE_URL
    depends_on:
      - ${REDIS_PROJECT_HOST}
      - ${POSTGRES_PROJECT_HOST}
#    ports:
#      - "127.0.0.1:${RUST_OUTER_PORT}:${RUST_PORT}"
    expose:
      - "${RUST_OUTER_PORT}:${RUST_PORT}" # это вроде то же самое что строка выше с портами через локалхост
    networks:
      - bridge_network

  postgres_host:
    build:
      context: ./
      dockerfile: postgres/Dockerfile/Dockerfile_postgres
      args:
        - POSTGRES_PROJECT_VERSION
    #        TZ: ${WORKSPACE_TIMEZONE}
    image: ${POSTGRES_PROJECT_IMAGE}:${POSTGRES_PROJECT_VERSION}
    tty: true        # docker run -t
    restart: unless-stopped
    volumes:
      - ./postgres/data:${PG_ALLVERSIONS_DATA}
      - ./postgres/dump:/dump
    ports:
      - "127.0.0.1:${POSTGRES_OUTER_PORT}:${POSTGRES_PORT}"
    environment:
      - POSTGRES_HOST_AUTH_METHOD
      - POSTGRES_INITDB_ARGS
      - POSTGRES_PROJECT_DB
      - POSTGRES_PROJECT_USER
      - POSTGRES_PASSWORD
      - POSTGRES_PROJECT_VERSION
    networks:
      - bridge_network

  dump_postgres_host:
    image: postgres:${POSTGRES_PROJECT_VERSION}
    environment:
      - DUMP_DB_URL
      - POSTGRES_PROJECT_DB
    command: ./dump_scripts/dump.sh
    restart: unless-stopped
    volumes:
      - ./postgres/dump:/dump
      - ./postgres/dump_scripts:/dump_scripts
    depends_on:
      - ${POSTGRES_PROJECT_HOST}
    networks:
      - bridge_network

  redis_host:
    image: ${REDIS_IMAGE}:${REDIS_VERSION}
    restart: unless-stopped
    volumes:
      - ./redis/data:/data
    ports:
      - "127.0.0.1:${REDIS_OUTER_PORT}:${REDIS_PORT}"
    networks:
      - bridge_network

